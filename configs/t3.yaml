_BASE_: "Base-RandBox.yaml"
MODEL:
  WEIGHTS: "detectron2://ImageNetPretrained/torchvision/R-50.pkl"
  RESNETS:
    DEPTH: 50
    STRIDE_IN_1X1: False
  RandBox:
    NUM_PROPOSALS: 500
    NUM_CLASSES: 26
DATASETS:
  TRAIN: ("my_train",)
  TEST:  ("my_val",)
SOLVER:
  STEPS: (60000,)
  MAX_ITER: 65000
TEST:
  EVAL_PERIOD: 65000
  PREV_INTRODUCED_CLS: 13
  CUR_INTRODUCED_CLS: 6
INPUT:
  CROP:
    ENABLED: True
  FORMAT: "RGB"
